name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skill:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Structure check
        run: python scripts/check_structure.py .
      - name: Privacy scan
        run: python scripts/privacy_scan.py .
      - name: Content audit
        run: python scripts/content_audit.py .
      - name: Source audit
        run: python scripts/source_audit.py .
      - name: Pressure tests
        run: python scripts/run_pressure_tests.py .
      - name: Local install dry run
        shell: pwsh
        run: ./scripts/install-local.ps1 -CodexHome "$env:RUNNER_TEMP/codex-home" -WhatIf
      - name: Skill quick validate
        env:
          PYTHONUTF8: "1"
        run: python scripts/quick_validate_ci.py .
